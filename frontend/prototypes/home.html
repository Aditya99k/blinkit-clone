<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BlinkIt — Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: '#F8C200', dark: '#1A1A1A' }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .product-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
    .product-card { transition: transform 0.2s, box-shadow 0.2s; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen pb-32">

  <!-- STICKY HEADER -->
  <header class="sticky top-0 z-40 bg-white shadow-sm border-b border-gray-100">
    <div class="max-w-screen-xl mx-auto px-4 py-3 flex items-center gap-3">
      <!-- Logo -->
      <a href="index.html" class="flex items-center gap-2 shrink-0">
        <div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center">
          <span class="text-sm">🛒</span>
        </div>
        <span class="font-bold text-dark text-lg">BlinkIt</span>
      </a>

      <!-- Location -->
      <button class="flex items-center gap-1.5 bg-gray-50 hover:bg-gray-100 rounded-xl px-3 py-2 transition-colors flex-1 max-w-xs">
        <i class="fas fa-map-marker-alt text-primary text-xs"></i>
        <div class="text-left min-w-0">
          <p class="text-xs text-gray-500 leading-none">Deliver to</p>
          <p class="text-xs font-semibold text-dark truncate">Koramangala, Bangalore</p>
        </div>
        <i class="fas fa-chevron-down text-gray-400 text-xs ml-1"></i>
      </button>

      <!-- Right icons -->
      <div class="flex items-center gap-2 ml-auto">
        <button class="w-9 h-9 flex items-center justify-center rounded-xl hover:bg-gray-100 transition-colors">
          <i class="fas fa-search text-dark text-sm"></i>
        </button>
        <a href="cart.html" class="relative w-9 h-9 flex items-center justify-center rounded-xl hover:bg-gray-100 transition-colors">
          <i class="fas fa-shopping-cart text-dark text-sm"></i>
          <span id="cartBadge" class="hidden absolute -top-0.5 -right-0.5 w-4.5 h-4.5 bg-primary text-dark text-xs font-bold rounded-full flex items-center justify-center" style="width:18px;height:18px;font-size:10px">0</span>
        </a>
        <div class="w-9 h-9 bg-primary rounded-full flex items-center justify-center font-bold text-dark text-sm cursor-pointer">
          R
        </div>
      </div>
    </div>

    <!-- Search bar -->
    <div class="px-4 pb-3">
      <div class="relative">
        <i class="fas fa-search absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
        <input type="text" placeholder="Search for atta, dal, rice, eggs..."
          class="w-full pl-10 pr-4 py-2.5 bg-gray-100 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary transition-all" />
      </div>
    </div>
  </header>

  <main class="max-w-screen-xl mx-auto px-4 py-4 space-y-6">

    <!-- HERO BANNER -->
    <div class="relative bg-gradient-to-r from-primary to-yellow-300 rounded-2xl overflow-hidden p-5 shadow-md">
      <div class="relative z-10">
        <div class="inline-flex items-center gap-1.5 bg-dark text-white text-xs font-semibold px-3 py-1 rounded-full mb-2">
          <i class="fas fa-bolt text-primary"></i>
          Delivery in 10 minutes
        </div>
        <h2 class="text-2xl font-bold text-dark leading-tight mb-1">FLAT ₹50 OFF</h2>
        <p class="text-dark/70 text-sm mb-3">on orders above ₹299</p>
        <div class="flex items-center gap-3">
          <div class="bg-dark/10 rounded-lg px-3 py-1.5">
            <span class="text-dark font-bold text-sm tracking-widest">FLAT50</span>
          </div>
          <button class="bg-dark text-white text-sm font-semibold px-4 py-2 rounded-xl hover:bg-dark/80 transition-colors">
            Shop Now
          </button>
        </div>
      </div>
      <div class="absolute right-4 top-1/2 -translate-y-1/2 text-7xl opacity-20">🎁</div>
      <div class="absolute right-16 top-3 text-4xl opacity-30">⚡</div>
    </div>

    <!-- CATEGORIES -->
    <div>
      <h3 class="font-bold text-dark text-base mb-3">Shop by Category</h3>
      <div class="flex gap-3 overflow-x-auto hide-scrollbar pb-2">
        <button class="flex flex-col items-center gap-1.5 shrink-0 bg-white rounded-2xl p-3 shadow-sm border border-gray-100 hover:border-primary hover:shadow-md transition-all w-20">
          <span class="text-2xl">🥛</span>
          <span class="text-xs font-semibold text-dark text-center leading-tight">Dairy</span>
        </button>
        <button class="flex flex-col items-center gap-1.5 shrink-0 bg-white rounded-2xl p-3 shadow-sm border border-gray-100 hover:border-primary hover:shadow-md transition-all w-20">
          <span class="text-2xl">🥦</span>
          <span class="text-xs font-semibold text-dark text-center leading-tight">Vegetables</span>
        </button>
        <button class="flex flex-col items-center gap-1.5 shrink-0 bg-white rounded-2xl p-3 shadow-sm border border-gray-100 hover:border-primary hover:shadow-md transition-all w-20">
          <span class="text-2xl">🍎</span>
          <span class="text-xs font-semibold text-dark text-center leading-tight">Fruits</span>
        </button>
        <button class="flex flex-col items-center gap-1.5 shrink-0 bg-white rounded-2xl p-3 shadow-sm border border-gray-100 hover:border-primary hover:shadow-md transition-all w-20">
          <span class="text-2xl">🍞</span>
          <span class="text-xs font-semibold text-dark text-center leading-tight">Bakery</span>
        </button>
        <button class="flex flex-col items-center gap-1.5 shrink-0 bg-white rounded-2xl p-3 shadow-sm border border-gray-100 hover:border-primary hover:shadow-md transition-all w-20">
          <span class="text-2xl">🥚</span>
          <span class="text-xs font-semibold text-dark text-center leading-tight">Eggs</span>
        </button>
        <button class="flex flex-col items-center gap-1.5 shrink-0 bg-white rounded-2xl p-3 shadow-sm border border-gray-100 hover:border-primary hover:shadow-md transition-all w-20">
          <span class="text-2xl">🧴</span>
          <span class="text-xs font-semibold text-dark text-center leading-tight">Personal Care</span>
        </button>
        <button class="flex flex-col items-center gap-1.5 shrink-0 bg-white rounded-2xl p-3 shadow-sm border border-gray-100 hover:border-primary hover:shadow-md transition-all w-20">
          <span class="text-2xl">🧹</span>
          <span class="text-xs font-semibold text-dark text-center leading-tight">Cleaning</span>
        </button>
        <button class="flex flex-col items-center gap-1.5 shrink-0 bg-white rounded-2xl p-3 shadow-sm border border-gray-100 hover:border-primary hover:shadow-md transition-all w-20">
          <span class="text-2xl">🍫</span>
          <span class="text-xs font-semibold text-dark text-center leading-tight">Snacks</span>
        </button>
      </div>
    </div>

    <!-- BEST SELLERS -->
    <div>
      <div class="flex items-center justify-between mb-3">
        <h3 class="font-bold text-dark text-base">🔥 Best Sellers</h3>
        <a href="#" class="text-primary text-xs font-semibold hover:underline">See all</a>
      </div>
      <div class="grid grid-cols-2 sm:grid-cols-4 gap-3" id="bestSellers">
        <!-- Products rendered by JS -->
      </div>
    </div>

    <!-- DAIRY & EGGS -->
    <div>
      <div class="flex items-center justify-between mb-3">
        <h3 class="font-bold text-dark text-base">🥛 Dairy &amp; Eggs</h3>
        <a href="#" class="text-primary text-xs font-semibold hover:underline">See all</a>
      </div>
      <div class="grid grid-cols-2 sm:grid-cols-4 gap-3" id="dairySection">
      </div>
    </div>

  </main>

  <!-- FLOATING CART BAR -->
  <div id="cartBar" class="hidden fixed bottom-4 left-1/2 -translate-x-1/2 z-50 w-11/12 max-w-md">
    <a href="cart.html" class="flex items-center justify-between bg-dark text-white px-5 py-3.5 rounded-2xl shadow-2xl hover:bg-dark/90 transition-all">
      <div class="flex items-center gap-2">
        <div class="w-7 h-7 bg-primary rounded-lg flex items-center justify-center">
          <i class="fas fa-shopping-cart text-dark text-xs"></i>
        </div>
        <span id="cartCount" class="font-semibold text-sm">0 items</span>
        <span class="text-gray-400 text-sm">·</span>
        <span id="cartTotal" class="font-bold text-sm">₹0</span>
      </div>
      <div class="flex items-center gap-1 text-primary font-semibold text-sm">
        View Cart
        <i class="fas fa-arrow-right text-xs"></i>
      </div>
    </a>
  </div>

  <script>
    const bestSellersData = [
      { id: 1, emoji: '🧈', name: 'Amul Butter', unit: '500g', price: 52, mrp: 60, discount: 13, bg: 'bg-yellow-50' },
      { id: 2, emoji: '🍞', name: 'Brown Bread', unit: '400g', price: 35, mrp: 40, discount: 13, bg: 'bg-orange-50' },
      { id: 3, emoji: '🥛', name: 'Toned Milk', unit: '500ml', price: 28, mrp: 30, discount: 7, bg: 'bg-blue-50' },
      { id: 4, emoji: '🥚', name: 'Fresh Eggs', unit: '6-pack', price: 65, mrp: 72, discount: 10, bg: 'bg-amber-50' },
    ];
    const dairyData = [
      { id: 5, emoji: '🥛', name: 'Full Cream Milk', unit: '1L', price: 58, mrp: 62, discount: 6, bg: 'bg-blue-50' },
      { id: 6, emoji: '🧀', name: 'Amul Cheese', unit: '200g', price: 89, mrp: 100, discount: 11, bg: 'bg-yellow-50' },
      { id: 7, emoji: '🍶', name: 'Dahi (Curd)', unit: '400g', price: 45, mrp: 50, discount: 10, bg: 'bg-purple-50' },
      { id: 8, emoji: '🧈', name: 'Cow Ghee', unit: '250ml', price: 175, mrp: 200, discount: 13, bg: 'bg-orange-50' },
    ];

    let cart = {};

    function updateCartUI() {
      const items = Object.values(cart);
      const totalItems = items.reduce((s, i) => s + i.qty, 0);
      const totalPrice = items.reduce((s, i) => s + i.price * i.qty, 0);
      const badge = document.getElementById('cartBadge');
      const bar = document.getElementById('cartBar');
      if (totalItems > 0) {
        badge.textContent = totalItems;
        badge.classList.remove('hidden');
        bar.classList.remove('hidden');
        document.getElementById('cartCount').textContent = totalItems + (totalItems === 1 ? ' item' : ' items');
        document.getElementById('cartTotal').textContent = '₹' + totalPrice;
        localStorage.setItem('blinkitCart', JSON.stringify(cart));
      } else {
        badge.classList.add('hidden');
        bar.classList.add('hidden');
        localStorage.removeItem('blinkitCart');
      }
    }

    function renderProductCard(p) {
      const card = document.createElement('div');
      card.className = 'product-card bg-white rounded-2xl p-3 border border-gray-100 shadow-sm flex flex-col';
      card.innerHTML = `
        <div class="relative mb-2">
          <div class="${p.bg} rounded-xl h-28 flex items-center justify-center text-5xl">${p.emoji}</div>
          <span class="absolute top-2 left-2 bg-green-500 text-white text-xs font-bold px-1.5 py-0.5 rounded-md">${p.discount}% OFF</span>
        </div>
        <p class="text-xs text-gray-500 mb-0.5">${p.unit}</p>
        <p class="font-semibold text-dark text-sm mb-1 leading-tight">${p.name}</p>
        <div class="flex items-center gap-1.5 mb-3">
          <span class="font-bold text-dark text-sm">₹${p.price}</span>
          <span class="text-gray-400 text-xs line-through">₹${p.mrp}</span>
        </div>
        <div class="mt-auto" id="ctrl-${p.id}">
          <button onclick="addToCart(${p.id})" class="w-full bg-primary hover:bg-yellow-400 text-dark font-bold text-sm py-2 rounded-xl transition-all">
            + ADD
          </button>
        </div>
      `;
      return card;
    }

    function addToCart(id) {
      const all = [...bestSellersData, ...dairyData];
      const p = all.find(x => x.id === id);
      if (!cart[id]) cart[id] = { ...p, qty: 0 };
      cart[id].qty++;
      updateQtyControl(id);
      updateCartUI();
    }

    function changeQty(id, delta) {
      if (!cart[id]) return;
      cart[id].qty += delta;
      if (cart[id].qty <= 0) delete cart[id];
      updateQtyControl(id);
      updateCartUI();
    }

    function updateQtyControl(id) {
      const ctrl = document.getElementById('ctrl-' + id);
      if (!ctrl) return;
      if (cart[id] && cart[id].qty > 0) {
        ctrl.innerHTML = `
          <div class="flex items-center justify-between bg-primary rounded-xl overflow-hidden">
            <button onclick="changeQty(${id},-1)" class="px-3 py-2 text-dark font-bold text-base hover:bg-yellow-400 transition-colors">−</button>
            <span class="font-bold text-dark text-sm">${cart[id].qty}</span>
            <button onclick="changeQty(${id},1)" class="px-3 py-2 text-dark font-bold text-base hover:bg-yellow-400 transition-colors">+</button>
          </div>
        `;
      } else {
        ctrl.innerHTML = `<button onclick="addToCart(${id})" class="w-full bg-primary hover:bg-yellow-400 text-dark font-bold text-sm py-2 rounded-xl transition-all">+ ADD</button>`;
      }
    }

    // Load saved cart from localStorage
    const saved = localStorage.getItem('blinkitCart');
    if (saved) {
      try { cart = JSON.parse(saved); } catch(e) {}
    }

    const bsContainer = document.getElementById('bestSellers');
    const dairyContainer = document.getElementById('dairySection');
    bestSellersData.forEach(p => bsContainer.appendChild(renderProductCard(p)));
    dairyData.forEach(p => dairyContainer.appendChild(renderProductCard(p)));

    // Restore cart controls
    Object.keys(cart).forEach(id => updateQtyControl(parseInt(id)));
    updateCartUI();
  </script>
</body>
</html>
