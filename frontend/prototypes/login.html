<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BlinkIt — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#F8C200',
            dark: '#1A1A1A',
          },
          fontFamily: {
            inter: ['Inter', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    .input-field {
      @apply w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all bg-gray-50 text-dark;
    }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-yellow-50 via-white to-yellow-50 flex items-center justify-center p-4">

  <div class="w-full max-w-md">
    <!-- Card -->
    <div class="bg-white rounded-3xl shadow-xl p-8 border border-gray-100">

      <!-- Logo -->
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-primary rounded-2xl mb-4 shadow-lg">
          <span class="text-2xl">🛒</span>
        </div>
        <h1 class="text-2xl font-bold text-dark">BlinkIt</h1>
        <p class="text-gray-400 text-sm mt-1">Delivery in 10 minutes</p>
      </div>

      <!-- Welcome text -->
      <div class="mb-6">
        <h2 class="text-xl font-bold text-dark">Welcome back!</h2>
        <p class="text-gray-500 text-sm mt-1">Sign in to continue shopping</p>
      </div>

      <!-- Error message -->
      <div id="errorMsg" class="hidden mb-4 px-4 py-3 bg-red-50 border border-red-200 rounded-xl flex items-center gap-2">
        <i class="fas fa-exclamation-circle text-red-500 text-sm"></i>
        <span id="errorText" class="text-red-600 text-sm font-medium"></span>
      </div>

      <!-- Form -->
      <form id="loginForm" novalidate>
        <!-- Email -->
        <div class="mb-4">
          <label class="block text-sm font-semibold text-dark mb-2">Email address</label>
          <div class="relative">
            <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
            <input
              id="email"
              type="email"
              placeholder="you@example.com"
              class="w-full pl-11 pr-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all bg-gray-50 text-dark"
            />
          </div>
          <p id="emailError" class="hidden text-red-500 text-xs mt-1 ml-1">Please enter a valid email address</p>
        </div>

        <!-- Password -->
        <div class="mb-2">
          <label class="block text-sm font-semibold text-dark mb-2">Password</label>
          <div class="relative">
            <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
            <input
              id="password"
              type="password"
              placeholder="Enter your password"
              class="w-full pl-11 pr-12 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all bg-gray-50 text-dark"
            />
            <button type="button" id="togglePassword" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 transition-colors">
              <i id="eyeIcon" class="fas fa-eye text-sm"></i>
            </button>
          </div>
          <p id="passwordError" class="hidden text-red-500 text-xs mt-1 ml-1">Password cannot be empty</p>
        </div>

        <!-- Forgot password -->
        <div class="flex justify-end mb-6">
          <a href="#" class="text-xs font-semibold text-primary hover:underline">Forgot Password?</a>
        </div>

        <!-- Login button -->
        <button
          type="submit"
          class="w-full bg-primary hover:bg-yellow-400 active:bg-yellow-500 text-dark font-bold py-3.5 rounded-xl transition-all duration-200 text-sm shadow-md hover:shadow-lg transform hover:-translate-y-0.5"
        >
          Login
        </button>
      </form>

      <!-- Divider -->
      <div class="flex items-center gap-3 my-6">
        <div class="flex-1 h-px bg-gray-200"></div>
        <span class="text-gray-400 text-xs font-medium">or</span>
        <div class="flex-1 h-px bg-gray-200"></div>
      </div>

      <!-- Google sign in -->
      <button class="w-full flex items-center justify-center gap-3 border border-gray-200 rounded-xl py-3 text-sm font-semibold text-dark hover:bg-gray-50 transition-all">
        <svg class="w-5 h-5" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continue with Google
      </button>

      <!-- Sign up link -->
      <p class="text-center text-sm text-gray-500 mt-6">
        Don't have an account?
        <a href="signup.html" class="text-primary font-bold hover:underline">Sign Up</a>
      </p>
    </div>

    <!-- Back to index -->
    <p class="text-center text-xs text-gray-400 mt-4">
      <a href="index.html" class="hover:text-gray-600 transition-colors">← Back to Prototypes</a>
    </p>
  </div>

  <script>
    const toggleBtn = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');
    const eyeIcon = document.getElementById('eyeIcon');

    toggleBtn.addEventListener('click', () => {
      const isPassword = passwordInput.type === 'password';
      passwordInput.type = isPassword ? 'text' : 'password';
      eyeIcon.className = isPassword ? 'fas fa-eye-slash text-sm' : 'fas fa-eye text-sm';
    });

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      let valid = true;

      // Reset errors
      document.getElementById('emailError').classList.add('hidden');
      document.getElementById('passwordError').classList.add('hidden');
      document.getElementById('errorMsg').classList.add('hidden');

      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        document.getElementById('emailError').classList.remove('hidden');
        document.getElementById('email').classList.add('border-red-400');
        valid = false;
      } else {
        document.getElementById('email').classList.remove('border-red-400');
      }

      if (!password) {
        document.getElementById('passwordError').classList.remove('hidden');
        document.getElementById('password').classList.add('border-red-400');
        valid = false;
      } else {
        document.getElementById('password').classList.remove('border-red-400');
      }

      if (!valid) {
        document.getElementById('errorText').textContent = 'Please fix the errors below and try again.';
        document.getElementById('errorMsg').classList.remove('hidden');
        return;
      }

      // Simulate login — redirect to home
      window.location.href = 'home.html';
    });
  </script>
</body>
</html>
